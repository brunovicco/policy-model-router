name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      # Backs tests/integration/test_redis_rate_limiter_integration.py (ADR-0008). Those tests
      # skip themselves if unreachable, so this service only makes them run instead of skip.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --all-groups --extra rate-limit

      - name: Project quality gate
        run: uv run python scripts/quality_gate.py

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build image
        run: docker build -t policy-model-router:ci .

      - name: Smoke test the image
        # Deliberately Redis-free: the shipped image's Redis integration is already covered by
        # the quality job's Python-level integration test. This only proves the built image
        # itself (dependencies, CMD, the multi-stage copy) isn't broken before a real release
        # ever pushes it.
        run: |
          docker run -d --name pmr-smoke -p 8000:8000 \
            -e API_KEYS='{"smoke-agent":"smoke-key"}' \
            policy-model-router:ci

          for _ in $(seq 1 20); do
            if curl -fs http://localhost:8000/health > /dev/null; then
              break
            fi
            sleep 1
          done

          if ! curl -fs http://localhost:8000/health; then
            echo "container never became healthy"
            docker logs pmr-smoke
            exit 1
          fi
          curl -fs http://localhost:8000/readyz

      - name: Show container logs
        if: always()
        run: docker logs pmr-smoke

      - name: Stop container
        if: always()
        run: docker rm -f pmr-smoke
